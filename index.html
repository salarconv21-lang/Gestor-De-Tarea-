<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestor de Tareas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg-noise"></div>

  <header>
    <div class="logo">✦ TaskFlow</div>
    <div class="stats">
      <span id="stat-done">0 hechas</span>
      <span class="sep">·</span>
      <span id="stat-pending">0 pendientes</span>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Tus tareas,<br/><em>bajo control.</em></h1>
      <p class="subtitle">Organiza, prioriza y completa lo que importa.</p>
    </section>

    <section class="input-area">
      <div class="input-row">
        <input type="text" id="task-input" placeholder="Escribe una nueva tarea…" maxlength="120"/>
        <select id="priority-select">
          <option value="alta">🔴 Alta</option>
          <option value="media" selected>🟡 Media</option>
          <option value="baja">🟢 Baja</option>
        </select>
        <button id="add-btn" onclick="addTask()">Agregar</button>
      </div>
    </section>

    <section class="filters">
      <button class="filter-btn active" onclick="setFilter('todas', this)">Todas</button>
      <button class="filter-btn" onclick="setFilter('pendiente', this)">Pendientes</button>
      <button class="filter-btn" onclick="setFilter('completada', this)">Completadas</button>
      <button class="filter-btn danger" onclick="clearCompleted()">Limpiar completadas</button>
    </section>

    <section class="task-list" id="task-list">
      <div class="empty-state" id="empty-state">
        <span>✦</span>
        <p>No hay tareas aún. ¡Agrega una!</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Gestor de Tareas · HTML / CSS / JS</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
